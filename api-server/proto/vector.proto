syntax = "proto3";

package redvector;

// Vector search service (similar to Qdrant)
service VectorService {
    // Create a collection/index
    rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
    
    // Insert vectors
    rpc Upsert(UpsertRequest) returns (UpsertResponse);
    
    // Search vectors
    rpc Search(SearchRequest) returns (SearchResponse);
    
    // Get collection info
    rpc GetCollectionInfo(GetCollectionInfoRequest) returns (GetCollectionInfoResponse);
    
    // Delete collection
    rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);
}

message CreateCollectionRequest {
    string collection_name = 1;
    uint32 vector_size = 2;
    string distance = 3; // "Cosine", "Euclidean", "InnerProduct"
}

message CreateCollectionResponse {
    bool success = 1;
    string message = 2;
}

message Point {
    uint64 id = 1;
    repeated float vector = 2;
    map<string, string> payload = 3;
}

message UpsertRequest {
    string collection_name = 1;
    repeated Point points = 2;
}

message UpsertResponse {
    bool success = 1;
    uint32 upserted_count = 2;
}

message SearchRequest {
    string collection_name = 1;
    repeated float query_vector = 2;
    uint32 top = 3;
    map<string, string> filter = 4;
}

message ScoredPoint {
    uint64 id = 1;
    float score = 2;
    map<string, string> payload = 3;
}

message SearchResponse {
    repeated ScoredPoint result = 1;
}

message GetCollectionInfoRequest {
    string collection_name = 1;
}

message GetCollectionInfoResponse {
    string collection_name = 1;
    uint32 vector_size = 2;
    uint64 points_count = 3;
    string distance = 4;
}

message DeleteCollectionRequest {
    string collection_name = 1;
}

message DeleteCollectionResponse {
    bool success = 1;
}

