apiVersion: v1
kind: ConfigMap
metadata:
  name: redvector-config
data:
  redvector.conf: |
    # Kubernetes: persistence on mounted PVC at /data/redvector
    port 6379

    databases 16

    save 900 1
    save 300 10
    save 60 10000
    dbfilename dump.rdb
    dir /data/redvector

    appendonly yes
    appendfilename appendonly.aof
    appendfsync everysec

    # Below maxmemory must stay below pod memory limit (see StatefulSet).
    maxmemory 1073741824
    maxmemory-policy noeviction
    maxmemory-samples 5

    loglevel notice

    hz 10
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 67108864

    slowlog-log-slower-than 10000
    slowlog-max-len 128
    latency-monitor-threshold 0
    maxclients 10000

    # requirepass set via overlay or manual patch (see README)
