apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redvector

resources:
  - namespace.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: redvector
      app.kubernetes.io/component: vector-store
