apiVersion: v1
kind: Service
metadata:
  name: redvector
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: redvector
  ports:
    - name: redis
      port: 6379
      targetPort: redis
    - name: http
      port: 8888
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc
