apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Set image before apply, e.g.:
#   kustomize edit set image redvector=${REGION}-docker.pkg.dev/${PROJECT}/redvector/redvector:${TAG}
# or: kubectl -n redvector set image statefulset/redvector redvector=... after apply
images:
  - name: redvector
    newName: redvector
    newTag: latest

patches:
  - path: storage-class.yaml
