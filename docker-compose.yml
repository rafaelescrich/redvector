version: '3.8'

services:
  redvector:
    build:
      context: .
      dockerfile: Dockerfile
    image: redvector:latest
    container_name: redvector
    ports:
      - "6379:6379"
    volumes:
      - redvector-data:/data
      - ./redvector.conf:/etc/redvector/redvector.conf:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo -e '*1\\r\\n$$4\\r\\nPING\\r\\n' | timeout 1 nc localhost 6379 | grep -q PONG || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: ["/etc/redvector/redvector.conf"]
    networks:
      - redvector-network

volumes:
  redvector-data:
    driver: local

networks:
  redvector-network:
    driver: bridge

