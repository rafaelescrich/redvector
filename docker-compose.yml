services:
  redvector:
    build:
      context: .
      dockerfile: Dockerfile
    image: redvector:latest
    container_name: redvector
    ports:
      - "6379:6379"   # Redis protocol
      - "8888:8888"   # REST API
      - "50051:50051" # gRPC API
    volumes:
      - redvector-data:/data
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    networks:
      - redvector-network

volumes:
  redvector-data:
    driver: local

networks:
  redvector-network:
    driver: bridge
